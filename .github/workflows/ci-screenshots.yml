name: Visual Regression Screenshots

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  screenshots:
    name: Capture & Compare Screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Dependencies ─────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── Playwright browsers ──────────────────────────────────────────────────
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # ── Restore baseline cache ───────────────────────────────────────────────
      - name: Restore screenshot baselines
        id: baseline-cache
        uses: actions/cache@v4
        with:
          path: .ci-screenshots/baselines
          key: baselines-${{ github.event.repository.default_branch }}-${{ hashFiles('scripts/ci-screenshots/route-manifest.ts') }}
          restore-keys: |
            baselines-${{ github.event.repository.default_branch }}-

      # ── Build Next.js ────────────────────────────────────────────────────────
      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      # ── Start production server ──────────────────────────────────────────────
      - name: Start production server
        run: npm run start &
        env:
          PORT: 3000

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time" && exit 1

      # ── Run pipeline ─────────────────────────────────────────────────────────
      - name: Run CI screenshot pipeline
        run: npm run ci:screenshots
        env:
          BASE_BRANCH: origin/${{ github.event.repository.default_branch }}
          HEAD_BRANCH: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          BASE_URL: http://localhost:3000
          OUTPUT_DIR: .ci-screenshots/output

      # ── Upload screenshots as artifacts ──────────────────────────────────────
      - name: Upload screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-screenshots-${{ github.run_id }}
          path: .ci-screenshots/output/
          retention-days: 30

      # ── Save baselines on main branch pushes ─────────────────────────────────
      - name: Persist baseline screenshots (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p .ci-screenshots/baselines
          cp -r .ci-screenshots/output/*.png .ci-screenshots/baselines/ 2>/dev/null || true
          echo '{"commitHash":"${{ github.sha }}","branch":"main","capturedAt":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' \
            > .ci-screenshots/baselines/baseline-metadata.json

      - name: Save baseline cache (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: .ci-screenshots/baselines
          key: baselines-${{ github.event.repository.default_branch }}-${{ hashFiles('scripts/ci-screenshots/route-manifest.ts') }}

      # ── Post PR comment ───────────────────────────────────────────────────────
      - name: Post PR report comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reportPath = '.ci-screenshots/output/report.md';
            if (!fs.existsSync(reportPath)) {
              console.log('No report.md found — skipping comment');
              return;
            }
            const body = fs.readFileSync(reportPath, 'utf8');
            const marker = '<!-- ci-screenshots-report -->';
            const fullBody = `${marker}\n${body}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

      # ── Set check status ──────────────────────────────────────────────────────
      - name: Set GitHub check status
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summaryPath = '.ci-screenshots/output/summary.json';
            let conclusion = 'success';
            let title = 'No visual changes detected';
            if (fs.existsSync(summaryPath)) {
              const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
              if (summary.hasChanges) {
                conclusion = 'neutral';
                title = `Visual changes: ${summary.major} major, ${summary.minor} minor`;
              }
            }
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Visual Regression',
              head_sha: context.sha,
              status: 'completed',
              conclusion,
              output: { title, summary: title },
            });
