name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test --if-present
      - run: npm run build
      - name: Check screenshot for UI changes
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only origin/main | grep -E "\.tsx|\.jsx"; then
            echo "UI change detected. Checking for screenshot..."
            if ! grep -q "![Screenshot]" <<< "${{ github.event.pull_request.body }}"; then
              echo "Screenshot missing!"
              exit 1
            fi
          fi

  deploy:
    name: Deploy to production
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Run deploy script
        run: bash /home/claw/repos/financial-analyzer/deploy.sh
