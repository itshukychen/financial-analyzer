name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm test --if-present
      - run: pnpm build
      - name: Check screenshot for UI changes
        run: |
          if git diff --name-only origin/main | grep -E "\.tsx|\.jsx"; then
            echo "UI change detected. Checking for screenshot..."
            if ! grep -q "![Screenshot]" <<< "${{ github.event.pull_request.body }}"; then
              echo "Screenshot missing!"
              exit 1
            fi
          fi
