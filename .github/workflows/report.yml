name: daily-report

on:
  schedule:
    - cron: '35 14 * * 1-5'  # 9:35 AM ET (14:35 UTC), Mon–Fri — captures overnight + opening move
  workflow_dispatch:           # Allow manual trigger

jobs:
  generate:
    name: Generate daily market report
    runs-on: self-hosted
    steps:
      - name: Generate report
        run: |
          cd /home/claw/prod/financial-analyzer
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
          REPORT_SECRET=${{ secrets.REPORT_SECRET }} \
          npx tsx scripts/generate-report.ts

      - name: Verify report was saved
        run: |
          cd /home/claw/prod/financial-analyzer
          npx tsx -e "
            const { getLatestReport } = require('./lib/db');
            const row = getLatestReport();
            if (!row) { console.error('❌ No report found in DB'); process.exit(1); }
            console.log('✅ Report saved for', row.date);
          "
